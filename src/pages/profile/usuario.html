<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi Cuenta | MuscleRice</title>

  <!-- CSS de usuario (Ruta correcta) -->
  <link rel="stylesheet" href="/src/styles/pages/_profile.css">

  <!-- Iconos -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

  <div class="perfil-container">

    <div class="perfil-card">

      <div class="perfil-header">
        <div class="avatar">
          <i class="fa-solid fa-user"></i>
        </div>
        <h2 id="nombreUsuario">Usuario MuscleRice</h2>
        <p id="emailUsuario">correo@musclerice.com</p>
      </div>

      <div class="perfil-opciones">
        <button class="btn verde">
          <i class="fa-solid fa-box"></i> Mis pedidos
        </button>

        <button class="btn azul">
          <i class="fa-solid fa-gear"></i> Configuración
        </button>

        <button class="btn rojo" id="btnCerrar">
          <i class="fa-solid fa-right-from-bracket"></i> Cerrar sesión
        </button>
      </div>

    </div>

  </div>

  <!-- Lógica de sesión y protección de ruta -->
  <script type="module" src="/src/scripts/pages/profile.ts"></script>
</body>
</html>
