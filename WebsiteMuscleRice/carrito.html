<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrito - MuscleRice</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #ffffff;
            font-family: Arial, sans-serif;
            color: #222;
        }

        /* Logo y encabezado */
        header {
            background-color: white;
            padding: 15px 25px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 3px solid #2ecc71;
        }

        .logo {
            width: 140px;
        }

        .btn-regresar {
            background-color: #2ecc71;
            padding: 10px 18px;
            border-radius: 8px;
            color: white;
            text-decoration: none;
            font-weight: bold;
        }

        /* Contenedor principal */
        .carrito-container {
            width: 90%;
            margin: 30px auto;
            background: #f8f8f8;
            padding: 25px;
            border-radius: 12px;
            border: 2px solid #2ecc71;
        }

        h2 {
            color: #2ecc71;
            margin-bottom: 20px;
        }

        /* Producto */
        .item {
            display: flex;
            align-items: center;
            background: white;
            padding: 15px;
            border-radius: 12px;
            border: 1px solid #2ecc71;
            margin-bottom: 20px;
        }

        .product-img {
            width: 160px;
            height: 160px;
            object-fit: cover;
            border-radius: 12px;
            border: 2px solid #2ecc71;
        }

        .item-info {
            flex: 1;
            margin-left: 20px;
        }

        .item-info h3 {
            margin: 0;
            font-size: 20px;
        }

        .precio {
            font-size: 20px;
            font-weight: bold;
            color: #2ecc71;
        }

        /* Cantidad */
        .cantidad-controls {
            display: flex;
            align-items: center;
            margin-top: 10px;
        }

        .cantidad-controls button {
            width: 32px;
            height: 32px;
            background: #2ecc71;
            border: none;
            color: white;
            font-size: 20px;
            border-radius: 5px;
            cursor: pointer;
        }

        .cantidad-controls span {
            padding: 0 10px;
            font-size: 18px;
        }

        .btn-eliminar {
            background-color: #e74c3c;
            padding: 10px 15px;
            border: none;
            color: white;
            border-radius: 8px;
            cursor: pointer;
        }

        /* Resumen */
        .resumen {
            background: white;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #2ecc71;
        }

        .btn-pagar {
            width: 100%;
            background: #2ecc71;
            padding: 14px;
            border: none;
            font-size: 18px;
            border-radius: 10px;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        .btn-pagar:hover {
            background: #27ae60;
        }
        @media (max-width: 600px) {
            .item {
                flex-direction: column;
                align-items: flex-start;
            }
            .product-img {
                width: 100%;
                height: auto;
                max-height: 260px;
            }
            .item-info {
                margin-left: 0;
                margin-top: 10px;
            }
        }
    </style>
</head>

<body>

    <header>
        <img src="img/logo-musclerice..png" class="logo" alt="Logo">
        <a href="index.html" class="btn-regresar">Regresar al inicio</a>
    </header>

    <div class="carrito-container">

        <h2>🛒 Tu Carrito</h2>

        <!-- PRODUCTO -->
        <div class="item">
            <img src="img/whey protein.jpg" class="product-img" alt="Proteína">

            <div class="item-info">
                <h3>Whey Protein 1KG</h3>

                <div class="cantidad-controls">
                    <button>-</button>
                    <span>1</span>
                    <button>+</button>
                </div>
            </div>

            <div class="precio">$95.000</div>
            <button class="btn-eliminar">Eliminar</button>
        </div>

        <!-- RESUMEN -->
        <div class="resumen">
            <h3>Resumen del pedido</h3>
            <p>Subtotal: <strong>$95.000</strong></p>
            <p>Envío: <strong>$5.000</strong></p>
            <p>Total: <strong>$100.000</strong></p>

            <button class="btn-pagar">Proceder al pago</button>
        </div>

    </div>

</body>

</html>
