<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - MuscleRice</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #ffffff;
            font-family: Arial, Helvetica, sans-serif;
            color: #111;
        }

        /* BOTÓN REGRESAR */
        .back-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background-color: #2ecc71;
            padding: 10px 15px;
            border-radius: 6px;
            color: #fff;
            text-decoration: none;
            font-weight: bold;
        }

        .back-btn:hover {
            background-color: #27ae60;
        }

        /* CONTENEDOR */
        .login-container {
            width: 90%;
            max-width: 450px;
            margin: 80px auto;
            background: #f9f9f9;
            padding: 25px;
            border-radius: 12px;
            border: 1px solid #2ecc71;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.08);
        }

        /* LOGO */
        .logo {
            width: 160px;
            margin-bottom: 10px;
        }

        h2 {
            color: #2ecc71;
            margin-top: 10px;
            margin-bottom: 20px;
            font-size: 26px;
            font-weight: bold;
        }

        label {
            font-weight: bold;
            display: block;
            margin: 10px 0 5px;
        }

        input {
            width: 100%;
            padding: 12px;
            border-radius: 6px;
            border: 1px solid #ccc;
            margin-bottom: 15px;
            font-size: 15px;
            box-sizing: border-box;
        }

        .btn-login {
            width: 100%;
            background-color: #2ecc71;
            color: #fff;
            padding: 14px;
            font-size: 17px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: background-color 0.2s ease;
        }

        .btn-login:hover {
            background-color: #27ae60;
        }

        .register-link {
            text-align: center;
            margin-top: 15px;
            font-size: 15px;
        }

        .register-link a {
            color: #2ecc71;
            font-weight: bold;
            text-decoration: none;
        }

        /* Mensaje de error */
        .error-message {
            background-color: #fce8e6;
            color: #c53929;
            border: 1px solid #f8b9b0;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 15px;
            display: none;
            font-size: 14px;
        }
    </style>
</head>
<body>

<!-- REGRESAR -->
<a href="index.html" class="back-btn">
    <i class="fa fa-arrow-left"></i> Regresar
</a>

<div class="login-container">

    <img src="img/logo-musclerice..png" class="logo" alt="Logo MuscleRice">

    <h2>Iniciar Sesión</h2>

    <div id="mensajeError" class="error-message"></div>

    <form id="loginForm">
        <label for="email">Correo Electrónico</label>
        <input type="email" id="email" name="email" required>

        <label for="password">Contraseña</label>
        <input type="password" id="password" name="password" required>

        <button type="submit" class="btn-login">Ingresar</button>
    </form>

    <p class="register-link">
        ¿No tienes cuenta? <a href="registro.html">Regístrate aquí</a>
    </p>

</div>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<script src="js/auth.js"></script>
</body>
</html>
